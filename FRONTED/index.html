<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Library Tracker</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-400 via-pink-300 to-blue-300 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white/20 backdrop-blur-md shadow-xl rounded-2xl p-8 w-full max-w-md text-white border border-white/30">
    <h1 class="text-3xl font-bold text-center mb-6 text-white drop-shadow">📚 Personal Library Tracker</h1>

    <!-- Login Form -->
    <div id="login-form">
      <h2 class="text-xl font-semibold mb-4 text-white">Sign In</h2>
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="loginEmail" class="block">Email</label>
          <input type="email" id="loginEmail" required class="w-full px-3 py-2 rounded bg-white/20 border border-white/30 placeholder-white text-white focus:outline-none focus:ring-2 focus:ring-white"/>
        </div>
        <div>
          <label for="loginPassword" class="block">Password</label>
          <input type="password" id="loginPassword" required class="w-full px-3 py-2 rounded bg-white/20 border border-white/30 placeholder-white text-white focus:outline-none focus:ring-2 focus:ring-white"/>
        </div>
        <button type="submit" class="w-full bg-white text-purple-600 py-2 rounded font-semibold hover:bg-gray-100 transition">Sign In</button>
      </form>
      <p class="mt-4 text-center text-white">
        Don't have an account?
        <a href="#" id="showRegister" class="text-yellow-200 hover:underline">Sign Up</a>
      </p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <h2 class="text-xl font-semibold mb-4 text-white">Sign Up</h2>
      <form id="registerForm" class="space-y-4">
        <div>
          <label for="registerName" class="block">Name</label>
          <input type="text" id="registerName" required class="w-full px-3 py-2 rounded bg-white/20 border border-white/30 placeholder-white text-white focus:outline-none focus:ring-2 focus:ring-white"/>
        </div>
        <div>
          <label for="registerEmail" class="block">Email</label>
          <input type="email" id="registerEmail" required class="w-full px-3 py-2 rounded bg-white/20 border border-white/30 placeholder-white text-white focus:outline-none focus:ring-2 focus:ring-white"/>
        </div>
        <div>
          <label for="registerPassword" class="block">Password</label>
          <input type="password" id="registerPassword" required minlength="6" class="w-full px-3 py-2 rounded bg-white/20 border border-white/30 placeholder-white text-white focus:outline-none focus:ring-2 focus:ring-white"/>
        </div>
        <button type="submit" class="w-full bg-white text-green-600 py-2 rounded font-semibold hover:bg-gray-100 transition">Sign Up</button>
      </form>
      <p class="mt-4 text-center text-white">
        Already have an account?
        <a href="#" id="showLogin" class="text-yellow-200 hover:underline">Sign In</a>
      </p>
    </div>

    <!-- Message Box -->
    <div id="message" class="mt-4 text-center hidden"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
