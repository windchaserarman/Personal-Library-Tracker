<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Book - Personal Library Tracker</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #74ebd5, #acb6e5, #f9d6f3);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    input:focus,
    textarea:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
    }

    textarea::placeholder,
    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      font-weight: normal;
    }

    .checkbox-label input {
      margin-right: 10px;
    }

    .char-counter {
      font-size: 0.8rem;
      color: #ddd;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary {
      background-color: #fff;
      color: #6c63ff;
    }

    .btn-primary:hover {
      background-color: #e2e2e2;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    #message {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      border-radius: 8px;
      z-index: 100;
    }

    .hidden {
      display: none;
    }

    #searchResults {
      margin-top: 15px;
    }

    .search-result {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .search-result:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .search-flex {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-flex input {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1 id="pageTitle">📖 Add New Book</h1>
      <a href="dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </header>

    <div class="form-container">
      <form id="bookForm">
        <div class="form-group">
          <label for="bookTitle">Title:</label>
          <div class="search-flex">
            <input type="text" id="bookTitle" required placeholder="e.g., Atomic Habits"/>
            <button type="button" class="btn btn-secondary" id="searchBookBtn">🔍</button>
          </div>
        </div>

        <div class="form-group">
          <label for="bookAuthor">Author:</label>
          <input type="text" id="bookAuthor" required placeholder="e.g., James Clear"/>
        </div>

        <div class="form-group">
          <label for="bookGenre">Genre:</label>
          <input type="text" id="bookGenre" required placeholder="e.g., Fiction, Self-help, Mystery"/>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="bookIsRead"/>
            I have read this book
          </label>
        </div>

        <div class="form-group">
          <label for="bookNotes">Notes (Optional):</label>
          <textarea id="bookNotes" rows="4" maxlength="500" placeholder="Add your thoughts, quotes, or notes about this book..."></textarea>
          <small class="char-counter">0/500 characters</small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Book</button>
          <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>

      <div id="searchResults"></div>
    </div>
  </div>

  <div id="message" class="message hidden"></div>
  <script src="js/add-book.js"></script>
  <script>
    const searchBtn = document.getElementById('searchBookBtn');
    const bookTitleInput = document.getElementById('bookTitle');
    const authorInput = document.getElementById('bookAuthor');
    const genreInput = document.getElementById('bookGenre');
    const notesInput = document.getElementById('bookNotes');
    const searchResults = document.getElementById('searchResults');

    searchBtn.addEventListener('click', async () => {
      const query = bookTitleInput.value.trim();
      if (!query) return;

      const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}`);
      const data = await res.json();

      searchResults.innerHTML = '';

      if (data.items && data.items.length > 0) {
        data.items.slice(0, 3).forEach(book => {
          const info = book.volumeInfo;

          const div = document.createElement('div');
          div.className = 'search-result';
          div.innerHTML = `
            <strong>${info.title || 'No Title'}</strong><br>
            <em>${info.authors ? info.authors.join(', ') : 'Unknown Author'}</em><br>
            ${info.categories ? `<small>${info.categories.join(', ')}</small>` : ''}
          `;

          div.addEventListener('click', () => {
            bookTitleInput.value = info.title || '';
            authorInput.value = info.authors ? info.authors.join(', ') : '';
            genreInput.value = info.categories ? info.categories[0] : '';
            notesInput.value = info.description ? info.description.slice(0, 300) : '';
            searchResults.innerHTML = '';
          });

          searchResults.appendChild(div);
        });
      } else {
        searchResults.innerHTML = "<p>No results found.</p>";
      }
    });
  </script>
</body>
</html>
